<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
    /* 
    Escreva seu CSS Aqui 
    Gap Colour: #000
    White: #F0F1EC
    Red: #E72F24
    Black: #232629
    Blue: #004592
    Yellow: #F9D01E

    Para os tamanhos, verifique as instruções.
    HINT: Lembre-se você não consegue alterar as propriedades das linhas de um GRID.
    Mas as linhas de um Grid são transparentes!
    */
    body{
      background-color: gainsboro;

    }

    .container {
      display: grid;
      margin-left: 500px;
      margin-top: 100px;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      height: 78px;
      width: 50px;

    }

  </style>
</head>

<body>
  <div class="container"></div>
  <div class="cuadrado-Red"></div>
  <div class="cuadrado-Blue"></div>
  <div class="cuadrado-Yellow"></div>
  <div class="cuadrado-Black"></div>
  <div class="cuadrado"></div>
  <div class="cuadrado"></div>
  <div class="cuadrado"></div>
  <div class="cuadrado"></div>
  <div class="cuadrado"></div>
</body>

</html>
